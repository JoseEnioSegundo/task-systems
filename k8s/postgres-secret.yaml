# Em produção real, use `kubectl create secret` ou SealedSecrets em vez de
# versionar isso no Git. Para a avaliação, deixe explícito no README que
# isso é só para fins didáticos.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: task-systems
type: Opaque
stringData:
  POSTGRES_DB: task_systems
  POSTGRES_USER: app_user
  POSTGRES_PASSWORD: app_password
