# k3s já vem com Traefik instalado por padrão como Ingress Controller.
# Aqui usamos o CRD nativo do Traefik (IngressRoute) para rotear:
#   /api  -> backend  (Django)
#   /     -> frontend (Vue)
#   /pgadmin -> pgadmin (visualização do banco)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: task-systems-ingress
  namespace: task-systems
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: PathPrefix(`/admin`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: PathPrefix(`/swagger`) || PathPrefix(`/redoc`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: PathPrefix(`/static`)
      kind: Rule
      services:
        - name: backend
          port: 8000
    - match: PathPrefix(`/pgadmin`)
      kind: Rule
      services:
        - name: pgadmin
          port: 80
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend
          port: 80
