# Coloque este arquivo em .github/workflows/ci-cd.yml no repo task-systems.
# Cria as imagens do backend e frontend e publica no Docker Hub a cada push
# na branch main. Configure os secrets DOCKERHUB_USERNAME e DOCKERHUB_TOKEN
# no repositório (Settings > Secrets and variables > Actions).
name: CI/CD - build e push das imagens

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push - backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/task-systems-backend:latest

      - name: Build e push - frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/task-systems-frontend:latest
